<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi App de Pronunciación</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 0.9rem; }
        
        /* Buscador manual */
        .search-box { margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        input { padding: 10px; width: 70%; border: 1px solid #ddd; border-radius: 8px; }
        .btn-main { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }

        /* Grupos de temas */
        .tema-section { text-align: left; margin-top: 20px; }
        .tema-titulo { background: #2c3e50; color: white; padding: 8px 15px; border-radius: 10px; font-size: 1rem; margin-bottom: 10px; }
        .grid-palabras { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        
        .btn-palabra {
            background: #fff;
            border: 2px solid #3498db;
            color: #3498db;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-palabra:hover { background: #3498db; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗣️ Pro-Speaker</h1>
    <p class="subtitle">Aprende la pronunciación por temas</p>

    <!-- Buscador libre -->
    <div class="search-box">
        <input type="text" id="palabraLibre" placeholder="Escribe cualquier palabra...">
        <button class="btn-main" onclick="hablar(document.getElementById('palabraLibre').value)">🔊</button>
    </div>

    <!-- TEMA 1 -->
    <div class="tema-section">
        <div class="tema-titulo">Tema 1: Saludos</div>
        <div class="grid-palabras">
            <button class="btn-palabra" onclick="hablar('Hola')">Hola</button>
            <button class="btn-palabra" onclick="hablar('Buenos días')">Buenos días</button>
            <button class="btn-palabra" onclick="hablar('¿Cómo estás?')">¿Cómo estás?</button>
            <button class="btn-palabra" onclick="hablar('Adiós')">Adiós</button>
        </div>
    </div>

    <!-- TEMA 2 -->
    <div class="tema-section">
        <div class="tema-titulo">Tema 2: Comida</div>
        <div class="grid-palabras">
            <button class="btn-palabra" onclick="hablar('Manzana')">Manzana</button>
            <button class="btn-palabra" onclick="hablar('Pan')">Pan</button>
            <button class="btn-palabra" onclick="hablar('Agua')">Agua</button>
            <button class="btn-palabra" onclick="hablar('Desayuno')">Desayuno</button>
        </div>
    </div>

    <!-- TEMA 3 -->
    <div class="tema-section">
        <div class="tema-titulo">Tema 3: Viajes</div>
        <div class="grid-palabras">
            <button class="btn-palabra" onclick="hablar('Aeropuerto')">Aeropuerto</button>
            <button class="btn-palabra" onclick="hablar('Pasaporte')">Pasaporte</button>
            <button class="btn-palabra" onclick="hablar('Maleta')">Maleta</button>
            <button class="btn-palabra" onclick="hablar('Hotel')">Hotel</button>
        </div>
    </div>

</div>

<script>
    function hablar(texto) {
        if (!texto) return;
        const mensaje = new SpeechSynthesisUtterance();
        mensaje.text = texto;
        mensaje.lang = 'es-ES';
        mensaje.rate = 0.9;
        window.speechSynthesis.speak(mensaje);
    }
</script>

</body>
</html>
