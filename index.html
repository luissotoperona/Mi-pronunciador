<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Speaker Tabs</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; }
        
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px; background: #e8f4fd; color: #3498db; font-weight: bold; min-width: 120px; }

        /* Estilo de las Pestañas */
        .tabs-header { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; overflow-x: auto; }
        .tab-btn { background: #eee; border: none; padding: 10px 15px; cursor: pointer; border-radius: 8px; font-weight: bold; color: #666; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: #3498db; color: white; }

        /* Contenido de los temas */
        .tema-content { display: none; text-align: left; animation: fadeIn 0.3s; }
        .tema-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid-palabras { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 10px; }
        
        .btn-palabra {
            background: #fff; border: 2px solid #3498db; color: #3498db;
            padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600;
            transition: all 0.2s; outline: none;
        }
        .btn-palabra:hover { background: #f0f9ff; }
        .btn-palabra:active { transform: scale(0.95); background: #3498db; color: white; }

        .download-btn { display: inline-block; margin-top: 15px; color: #e74c3c; text-decoration: none; font-size: 0.85rem; font-weight: bold; border: 1px solid #e74c3c; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗣️ Pro-Speaker</h1>
    <div id="indicador" class="status-badge">Modo: Normal</div>

    <!-- Cabecera de Pestañas -->
    <div class="tabs-header">
        <button class="tab-btn active" onclick="abrirTema(event, 'tema1')">Saludos</button>
        <button class="tab-btn" onclick="abrirTema(event, 'tema2')">Comida</button>
        <button class="tab-btn" onclick="abrirTema(event, 'tema3')">Viajes</button>
    </div>

    <!-- Contenido TEMA 1 -->
    <div id="tema1" class="tema-content active">
        <div class="grid-palabras">
            <button class="btn-palabra" onclick="hablar('Hola')">Hola</button>
            <button class="btn-palabra" onclick="hablar('Gracias')">Gracias</button>
            <button class="btn-palabra" onclick="hablar('Por favor')">Por favor</button>
            <button class="btn-palabra" onclick="hablar('Buenos días')">Buenos días</button>
        </div>
        <a href="saludos.pdf" download class="download-btn">📥 Descargar PDF Saludos</a>
    </div>

    <!-- Contenido TEMA 2 -->
    <div id="tema2" class="tema-content">
        <div class="grid-palabras">
            <button class="btn-palabra" onclick="hablar('Manzana')">Manzana</button>
            <button class="btn-palabra" onclick="hablar('Cena')">Cena</button>
            <button class="btn-palabra" onclick="hablar('Restaurante')">Restaurante</button>
            <button class="btn-palabra" onclick="hablar('Hambre')">Hambre</button>
        </div>
        <a href="comida.pdf" download class="download-btn">📥 Descargar PDF Comida</a>
    </div>

    <!-- Contenido TEMA 3 -->
    <div id="tema3" class="tema-content">
        <div class="grid-palabras">
            <button class="btn-palabra" onclick="hablar('Avión')">Avión</button>
            <button class="btn-palabra" onclick="hablar('Maleta')">Maleta</button>
            <button class="btn-palabra" onclick="hablar('Pasaporte')">Pasaporte</button>
            <button class="btn-palabra" onclick="hablar('Estación')">Estación</button>
        </div>
        <a href="viajes.pdf" download class="download-btn">📥 Descargar PDF Viajes</a>
    </div>

</div>

<script>
    let ultimaPalabra = "";

    // Función para cambiar entre pestañas
    function abrirTema(evt, nombreTema) {
        // Ocultar todos los contenidos
        const contenidos = document.getElementsByClassName("tema-content");
        for (let i = 0; i < contenidos.length; i++) {
            contenidos[i].classList.remove("active");
        }

        // Quitar clase active de todos los botones
        const botones = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < botones.length; i++) {
            botones[i].classList.remove("active");
        }

        // Mostrar el tema actual y marcar el botón como activo
        document.getElementById(nombreTema).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // Función de voz con modo tortuga corregido
    function hablar(texto) {
        window.speechSynthesis.cancel();

        setTimeout(() => {
            const mensaje = new SpeechSynthesisUtterance();
            mensaje.text = texto;
            mensaje.lang = 'es-ES';
            const indicador = document.getElementById('indicador');

            if (ultimaPalabra.toLowerCase() === texto.toLowerCase()) {
                mensaje.rate = 0.3; 
                indicador.innerText = "Modo: Muy Lento 🐢";
                indicador.style.background = "#fdf2e9";
                indicador.style.color = "#e67e22";
                ultimaPalabra = ""; 
            } else {
                mensaje.rate = 1.0; 
                indicador.innerText = "Modo: Normal";
                indicador.style.background = "#e8f4fd";
                indicador.style.color = "#3498db";
                ultimaPalabra = texto;
            }

            window.speechSynthesis.speak(mensaje);
        }, 50);
    }
</script>

</body>
</html>
