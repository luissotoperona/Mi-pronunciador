<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Speaker - Unidad 1</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #ffffff; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 500px; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; }
        h1 { color: #1a73e8; font-size: 22px; margin: 0; }
        .status-pill { display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: 600; background: #f0f2f5; color: #5c6c7b; margin-top: 10px; transition: 0.3s; }

        .unidad-titulo { background: #1a73e8; color: white; padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; text-align: center; }

        /* Cuadrícula de vocabulario */
        .word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .word-btn { 
            background: #ffffff; 
            border: 1px solid #dcdfe4; 
            padding: 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: center; 
            font-size: 15px; 
            font-weight: 500;
            color: #2c3e50;
            transition: all 0.2s; 
        }
        .word-btn:hover { border-color: #1a73e8; background: #f8fbff; transform: translateY(-1px); }
        .word-btn:active { background: #e8f0fe; transform: translateY(0); }

        .footer-tip { margin-top: 25px; padding: 15px; background: #fff9e6; border-radius: 8px; font-size: 13px; color: #856404; text-align: center; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>🗣️ Practicador de Voz</h1>
        <div id="status" class="status-pill">MODO: NORMAL</div>
    </div>

    <div class="unidad-titulo">UNIDAD 1</div>

    <div class="word-grid">
        <button class="word-btn" onclick="speak('Nombre')">Nombre</button>
        <button class="word-btn" onclick="speak('Apellido')">Apellido</button>
        <button class="word-btn" onclick="speak('Bien')">Bien</button>
        <button class="word-btn" onclick="speak('Buenas tardes')">Buenas tardes</button>
        <button class="word-btn" onclick="speak('Buenos días')">Buenos días</button>
        <button class="word-btn" onclick="speak('Clase')">Clase</button>
        <button class="word-btn" onclick="speak('Compañero')">Compañero</button>
        <button class="word-btn" onclick="speak('Compañera')">Compañera</button>
        <button class="word-btn" onclick="speak('Despacio')">Despacio</button>
        <button class="word-btn" onclick="speak('Despedida')">Despedida</button>
        <button class="word-btn" onclick="speak('Expresión')">Expresión</button>
        <button class="word-btn" onclick="speak('Extranjero')">Extranjero</button>
        <button class="word-btn" onclick="speak('Extranjera')">Extranjera</button>
        <button class="word-btn" onclick="speak('Formal')">Formal</button>
        <button class="word-btn" onclick="speak('Frase')">Frase</button>
        <button class="word-btn" onclick="speak('Gracias')">Gracias</button>
        <button class="word-btn" onclick="speak('Hasta pronto')">Hasta pronto</button>
    </div>

    <div class="footer-tip">
        💡 <strong>Truco:</strong> Pulsa una palabra para oírla. <br>¡Pulsa de nuevo para escucharla <strong>más despacio</strong>! 🐢
    </div>
</div>

<script>
    let lastWord = "";
    
    function speak(text) {
        window.speechSynthesis.cancel();
        
        setTimeout(() => {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'es-ES';
            const status = document.getElementById('status');

            if (lastWord === text) {
                msg.rate = 0.4; // Modo tortuga
                status.innerText = "MODO: LENTO 🐢";
                status.style.background = "#fff3e0";
                status.style.color = "#ef6c00";
                lastWord = ""; // Resetea para que la próxima sea normal
            } else {
                msg.rate = 1.0; // Modo normal
                status.innerText = "MODO: NORMAL";
                status.style.background = "#f0f2f5";
                status.style.color = "#5c6c7b";
                lastWord = text;
            }
            window.speechSynthesis.speak(msg);
        }, 50);
    }
</script>

</body>
</html>
