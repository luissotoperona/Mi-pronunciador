<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Speaker + PDF</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px; background: #e8f4fd; color: #3498db; font-weight: bold; transition: all 0.3s; }
        
        .download-section { background: #fdf2f2; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px dashed #e74c3c; }
        .download-title { color: #e74c3c; font-weight: bold; margin-bottom: 10px; display: block; }
        .pdf-grid { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-pdf { background: #e74c3c; color: white; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }

        .tema-section { text-align: left; margin-top: 20px; }
        .tema-titulo { background: #34495e; color: white; padding: 10px 15px; border-radius: 10px; font-size: 1rem; margin-bottom: 12px; }
        .grid-palabras { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-bottom: 25px; }
        
        .btn-palabra {
            background: #fff; border: 2px solid #3498db; color: #3498db;
            padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600;
            transition: all 0.2s; outline: none;
        }
        .btn-palabra:active { transform: scale(0.95); background: #3498db; color: white; }
        .info-tip { font-size: 0.8rem; color: #95a5a6; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗣️ Pro-Speaker</h1>
    <div id="indicador" class="status-badge">Modo: Normal</div>

    <div class="download-section">
        <span class="download-title">📄 Descargar Vocabulario PDF</span>
        <div class="pdf-grid">
            <a href="tema1-saludos.pdf" download class="btn-pdf">📥 Tema 1</a>
            <a href="tema2-comida.pdf" download class="btn-pdf">📥 Tema 2</a>
        </div>
    </div>

    <div class="tema-section">
        <div class="tema-titulo">Tema 1: Esenciales</div>
        <div class="grid-palabras">
            <button class="btn-palabra" onclick="hablarInteligente('Biblioteca')">Biblioteca</button>
            <button class="btn-palabra" onclick="hablarInteligente('Ferrocarril')">Ferrocarril</button>
            <button class="btn-palabra" onclick="hablarInteligente('Gracias')">Gracias</button>
            <button class="btn-palabra" onclick="hablarInteligente('Escritorio')">Escritorio</button>
        </div>
    </div>

    <p class="info-tip">💡 1 clic: Normal | 2 clics seguidos: Tortuga 🐢</p>
</div>

<script>
    let ultimaPalabra = "";
    
    function hablarInteligente(texto) {
        // Cancelamos cualquier sonido anterior inmediatamente
        window.speechSynthesis.cancel();

        // Esperamos un suspiro (50ms) para que el navegador resetee la voz
        setTimeout(() => {
            const mensaje = new SpeechSynthesisUtterance();
            mensaje.text = texto;
            mensaje.lang = 'es-ES';
            const indicador = document.getElementById('indicador');

            // Comparación limpia para detectar el segundo clic
            if (ultimaPalabra.toLowerCase() === texto.toLowerCase()) {
                mensaje.rate = 0.3; // Súper lento
                indicador.innerText = "Modo: Muy Lento 🐢";
                indicador.style.background = "#fdf2e9";
                indicador.style.color = "#e67e22";
                ultimaPalabra = ""; // Reset para que el siguiente clic sea normal
            } else {
                mensaje.rate = 1.0; // Normal
                indicador.innerText = "Modo: Normal";
                indicador.style.background = "#e8f4fd";
                indicador.style.color = "#3498db";
                ultimaPalabra = texto;
            }

            window.speechSynthesis.speak(mensaje);
        }, 50);
    }
</script>

</body>
</html>
